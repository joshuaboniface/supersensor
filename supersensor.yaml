    unit_of_measurement: "ppm"
    icon: "mdi:molecule-co2"
    accuracy_decimals: 0
    update_interval: 15s
    lambda: |-
      if (id(bme680_calibration_mode).state) {
        return 400.0; // Standard atmospheric CO2 level during calibration
      }

      // Get the current AQ value (0-100)
      float aq = id(bme680_aq).state;

      // Convert AQ to eCO2
      // 400ppm = atmospheric CO2 level (good air quality)
      // 2000ppm = poor air quality
      // Linear interpolation between these points
      float eco2 = 400.0 + ((100.0 - aq) / 100.0) * 1600.0;

      return eco2;

  - platform: template
    name: "BME680 TVOC"
    id: bme680_tvoc
    unit_of_measurement: "ppb"
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    update_interval: 15s
    lambda: |-
      if (id(bme680_calibration_mode).state) {
        return 0.0; // Clean air during calibration
      }

      // Get the current AQ value (0-100)
      float aq = id(bme680_aq).state;

      // Convert AQ to TVOC
      // 0 ppb = very clean air
      // 2000 ppb = poor air quality
      // Non-linear mapping to emphasize changes in cleaner air
      float tvoc = pow((100.0 - aq) / 100.0, 1.5) * 2000.0;

      return tvoc;

  - platform: template
    name: "BME680 Air Quality Index"
    id: bme680_aqi
    unit_of_measurement: "AQI"
    icon: "mdi:air-filter"
    accuracy_decimals: 0
    update_interval: 15s
    lambda: |-
      if (id(bme680_calibration_mode).state) {
        return 0.0; // Perfect AQI during calibration
      }

      // Get the current AQ value (0-100)
      float aq = id(bme680_aq).state;

      // Convert to AQI scale (0-500)
      // This is a simplified conversion - real AQI includes multiple pollutants
      // We're using a non-linear scale to match AQI brackets
      float aqi;
      if (aq >= 90) {
        // Good (0-50)
        aqi = (100.0 - aq) * (50.0 / 10.0);
      } else if (aq >= 70) {
        // Moderate (51-100)
        aqi = 50.0 + (90.0 - aq) * (50.0 / 20.0);
      } else if (aq >= 50) {
        // Unhealthy for Sensitive Groups (101-150)
        aqi = 100.0 + (70.0 - aq) * (50.0 / 20.0);
      } else if (aq >= 30) {
        // Unhealthy (151-200)
        aqi = 150.0 + (50.0 - aq) * (50.0 / 20.0);
      } else if (aq >= 10) {
        // Very Unhealthy (201-300)
        aqi = 200.0 + (30.0 - aq) * (100.0 / 20.0);
      } else {
        // Hazardous (301-500)
        aqi = 300.0 + (10.0 - aq) * (200.0 / 10.0);
      }

      return aqi;

  - platform: template
    name: "BME680 VOC Index"
