switch:
  # Global enable/disable for voice support
  - platform: template
    name: "Enable Voice Support"
    icon: mdi:account-voice
    id: enable_voice_support
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - switch.turn_on: voice_support_active
    on_turn_off:
      - switch.turn_off: voice_support_active

  # Active voice support flag/switch
  - platform: template
    name: "Voice Support Active"
    icon: mdi:account-voice
    id: voice_support_active
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: config
    on_turn_on:
      - lambda: id(assist).set_use_wake_word(true);
      - voice_assistant.stop:
      - delay: 1s
      - voice_assistant.start_continuous:
    on_turn_off:
      - voice_assistant.stop:
      - lambda: id(assist).set_use_wake_word(false);

  # Global enable/disable for presence LED
  - platform: template
    name: "Enable Presence LED"
    icon: mdi:lightbulb-alert
    id: enable_presence_led
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: light_off
    on_turn_off:
      - script.execute: light_off

  # BME680 IAQ Calibration Mode
  - platform: template
    name: "BME680 AQ Calibration"
    icon: mdi:air-filter
    id: bme680_calibration_mode
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: config
    on_turn_on:
      then:
        # Phase 0: Initial setup
        - logger.log: "BME680 Calibration: Starting clean air snapshot"
        - lambda: |-
            id(bme680_calibration_phase) = 0;
            id(bme680_clean_resistance) = id(bme680_gas_resistance).state;
            id(bme680_polluted_resistance) = 0;
            id(bme680_last_resistance) = id(bme680_gas_resistance).state;
            id(bme680_resistance_increasing_count) = 0;

        # Phase 1: Clean air snapshot (30s)
        - delay: 30s
        - logger.log: "BME680 Calibration: Clean air snapshot complete, ready for IPA"
        - lambda: |-
            id(bme680_calibration_phase) = 1;
            id(bme680_clean_resistance) = id(bme680_gas_resistance).state;

        # Phase 2: IPA exposure (5m)
        - delay: 5min
        - logger.log: "BME680 Calibration: IPA exposure complete, waiting for minimum"
        - lambda: |-
            id(bme680_calibration_phase) = 2;

        # Phase 3: Wait for minimum value
        - while:
            condition:
              lambda: |-
                static float last_resistance = id(bme680_gas_resistance).state;
                float current_resistance = id(bme680_gas_resistance).state;

                // Track lowest value
                if (current_resistance < id(bme680_polluted_resistance) || id(bme680_polluted_resistance) == 0) {
                  id(bme680_polluted_resistance) = current_resistance;
                  id(bme680_resistance_increasing_count) = 0;
                }
                // Check if increasing
                else if (current_resistance > last_resistance) {
                  id(bme680_resistance_increasing_count)++;
                } else {
                  id(bme680_resistance_increasing_count) = 0;
                }

                last_resistance = current_resistance;
                return id(bme680_resistance_increasing_count) < 4;
            then:
              - delay: 15s

        # Phase 4: Recovery phase
        - logger.log: "BME680 Calibration: Minimum found, starting recovery"
        - lambda: |-
            id(bme680_calibration_phase) = 3;

        # Wait for recovery with periodic checks
        - while:
            condition:
              lambda: |-
                float current = id(bme680_gas_resistance).state;
                return current < id(bme680_clean_resistance) * 0.9;
            then:
              - logger.log:
                  format: "BME680 Calibration: Still recovering... (current: %.1f, target: %.1f)"
                  args: ['id(bme680_gas_resistance).state', 'id(bme680_clean_resistance) * 0.9']
              - delay: 10min

        # Once we've reached clean air levels
        - logger.log: "BME680 Calibration: Recovery complete, updating parameters"
        - lambda: |-
            float current = id(bme680_gas_resistance).state;
            float abs_humidity = id(bme680_absolute_humidity).state;

            // Update humidity compensation
            float new_slope = (log(current / id(bme680_clean_resistance))) / abs_humidity;
            float new_offset = log(current / id(bme680_clean_resistance)) - (new_slope * abs_humidity);

            float param_alpha = 0.1;
            id(bme680_humidity_slope) = (id(bme680_humidity_slope) * (1 - param_alpha)) + (new_slope * param_alpha);
            id(bme680_humidity_offset) = (id(bme680_humidity_offset) * (1 - param_alpha)) + (new_offset * param_alpha);

            // Mark calibration complete and record time
            id(bme680_calibration_phase) = 4;
            id(bme680_last_calibration_time) = std::time(nullptr);
        - switch.turn_off: bme680_calibration_mode

    on_turn_off:
      then:
        - logger.log: "BME680 Calibration: Process interrupted"
        - lambda: |-
            id(bme680_calibration_phase) = 0;

  - platform: ld2410
    engineering_mode:
      name: "LD2410C Engineering Mode"
      entity_category: diagnostic
    bluetooth:
      name: "LD2410C Bluetooth"
      entity_category: diagnostic

