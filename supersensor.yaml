  - platform: template
    name: "BME680 Room Health Score"
    icon: "mdi:home-heart"
    update_interval: 15s
    lambda: |-
      if (id(bme680_calibration_mode).state) {
        return {"Calibrating"};
      }

      // Get all relevant measurements
      float aq = id(bme680_aq).state;
      float temp = id(bme680_temperature).state;
      float hum = id(bme680_humidity).state;

      // Check temperature comfort (18-24°C ideal)
      bool temp_ok = (temp >= 18 && temp <= 24);

      // Check humidity comfort (40-60% ideal)
      bool hum_ok = (hum >= 40 && hum <= 60);

      // Check air quality (>70 is good)
      bool aq_ok = (aq >= 70);

      // Determine overall score
      if (temp_ok && hum_ok && aq_ok) {
        return {"Optimal"};
      } else if ((temp_ok && hum_ok) || (temp_ok && aq_ok) || (hum_ok && aq_ok)) {
        return {"Good"};
      } else if (temp_ok || hum_ok || aq_ok) {
        return {"Fair"};
      } else {
        return {"Poor"};
      }

