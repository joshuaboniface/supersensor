esphome:
  name: supersensor
  name_add_mac_suffix: true
  friendly_name: "Supersensor"
  project:
    name: joshuaboniface.supersensor
    version: "1.2"
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            id(supersensor_occupancy).publish_state(false);
            id(pir_presence).publish_state(false);
            id(light_presence).publish_state(false);
            id(radar_presence).publish_state(false);
        - light.turn_on:
            id: output_led
            effect: flash_white
    - priority: -600
      then:
        - wait_until:
            api.connected:
        - delay: 5s
        - if:
            condition:
              switch.is_on: enable_voice_support
            then:
              - logger.log: "Initializing voice assistant on boot"
              - switch.turn_off: voice_support_active
              - delay: 2s
              - switch.turn_on: voice_support_active

dashboard_import:
  package_import_url: github://joshuaboniface/supersensor/supersensor.yaml

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: 4.4.8
    platform_version: 5.4.0
    sdkconfig_options:
      CONFIG_ESP32_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ: "240"
      CONFIG_ESP32_DATA_CACHE_64KB: "y"
      CONFIG_ESP32_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ: "240"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_CACHE_WORKAROUND: "y"
      CONFIG_OPTIMIZATION_LEVEL_RELEASE: "y"

globals:
  - id: temperature_offset
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: humidity_offset
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: pressure_offset
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: elevation_meters
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: pir_hold_time
    type: int
    restore_value: true
    initial_value: "15"

  - id: light_presence_threshold
    type: int
    restore_value: true
    initial_value: "30"

  - id: occupancy_detect_mode
    type: int
    restore_value: true
    initial_value: "0"

  - id: occupancy_clear_mode
    type: int
    restore_value: true
    initial_value: "0"

  - id: last_api_connected_time
    type: uint32_t
    restore_value: no
    initial_value: "0"

  # BME680 IAQ calibration parameters
  - id: bme680_baseline
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: bme680_humidity_slope
    type: float
    restore_value: true
    initial_value: "0.03"

  - id: bme680_humidity_offset
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: bme680_calibration_samples
    type: int
    restore_value: true
    initial_value: "0"

  - id: bme680_calibration_start_time
    type: uint32_t
    restore_value: true
    initial_value: "0"

  # Add new globals for enhanced calibration
  - id: bme680_peak_resistance
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: bme680_night_samples
    type: int
    restore_value: true
    initial_value: "0"

  - id: bme680_day_samples
    type: int
    restore_value: true
    initial_value: "0"

  # Calibration state tracking
  - id: bme680_calibration_phase
    type: int
    restore_value: false
    initial_value: "0"  # 0=not started, 1=clean air, 2=pollutant exposure

  - id: bme680_clean_resistance
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: bme680_polluted_resistance
    type: float
    restore_value: true
    initial_value: "0.0"

  # Add new globals for tracking resistance trend
  - id: bme680_last_resistance
    type: float
    restore_value: false
    initial_value: "0.0"

  - id: bme680_resistance_increasing_count
    type: int
    restore_value: false
    initial_value: "0"

  # Add new global for last calibration time
  - id: bme680_last_calibration_time
    type: uint32_t
    restore_value: true
    initial_value: "0"

  # Add new global for step timing
  - id: bme680_step_start_time
    type: uint32_t
    restore_value: false
    initial_value: "0"

script:
  - id: light_off
    then:
      if:
        condition:
          - binary_sensor.is_on: supersensor_occupancy
          - switch.is_on: enable_presence_led
        then:
          - light.turn_on:
              id: output_led
              brightness: 15%
              red: 1
              green: 1
              blue: 1
              transition_length: 1s
        else:
          - light.turn_off:
              id: output_led
              transition_length: 1s

  - id: pir_handler
    then:
      - lambda: |-
          id(pir_presence).publish_state(true);
      - while:
          condition:
            binary_sensor.is_on: pir_gpio
          then:
            - delay: !lambda 'return(id(pir_hold_time) * 1000);'
      - lambda: |-
          id(pir_presence).publish_state(false);

  - id: light_handler
    then:
      - lambda: |-
          if (id(tsl2591_lux).state >= id(light_presence_threshold)) {
            id(light_presence).publish_state(true);
          } else {
            id(light_presence).publish_state(false);
          }

  - id: occupancy_detect_handler
    then:
      - lambda: |-
          ESP_LOGD("occupancy_detect_handler", "Occupancy detect handler triggered");

          // Get the current values of our presence sensors
          bool pir = id(pir_presence).state;
          bool radar = id(radar_presence).state;
          bool light = id(light_presence).state;

          // Determine if PIR counts (2nd bit of presence_type)
          int pir_counts = (id(occupancy_detect_mode) & ( 1 << 2 )) >> 2;

          // Determine if Radar counts (1st bit of presence_type)
          int radar_counts = (id(occupancy_detect_mode) & ( 1 << 1 )) >> 1;

          // Determine if Light counts (0th bit of presence_type)
          int light_counts = (id(occupancy_detect_mode) & ( 1 << 0 )) >> 0;

          // Determine our results
          bool new_state = false;
          if (pir_counts & radar_counts & light_counts) {
            // Logical AND of pir & radar & light
            new_state = pir & radar & light;
          } else if (pir_counts & radar_counts) {
            // Logical AND of pir & radar
            new_state = pir & radar;
          } else if (pir_counts & light_counts) {
            // Logical AND of pir & light
            new_state = pir & light;
          } else if (radar_counts & light_counts) {
            // Logical AND of radar & light
            new_state = radar & light;
          } else if (pir_counts) {
            // Only pir
            new_state = pir;
          } else if (radar_counts) {
            // Only radar
            new_state = radar;
          } else if (light_counts) {
            // Only light
            new_state = light;
          }

          ESP_LOGD("occupancy_detect_handler", "New state: %s", new_state ? "true" : "false");

          // Force update even if state hasn't changed
          id(supersensor_occupancy).publish_state(new_state);

          // Add a delayed re-publish to ensure state propagation
          if (new_state) {
            id(supersensor_occupancy).publish_state(new_state);
          }

  - id: occupancy_clear_handler
    then:
      - lambda: |-
          ESP_LOGD("occupancy_clear_handler", "Occupancy clear handler triggered");

          // Get the current values of our presence sensors
          bool pir = id(pir_presence).state;
          bool radar = id(radar_presence).state;
          bool light = id(light_presence).state;

          // Determine if PIR counts (2nd bit of presence_type)
          int pir_counts = (id(occupancy_clear_mode) & ( 1 << 2 )) >> 2;

          // Determine if Radar counts (1st bit of presence_type)
          int radar_counts = (id(occupancy_clear_mode) & ( 1 << 1 )) >> 1;

          // Determine if Light counts (0th bit of presence_type)
          int light_counts = (id(occupancy_clear_mode) & ( 1 << 0 )) >> 0;

          // Determine our results
          bool new_state = false;
          if (pir_counts & radar_counts & light_counts) {
            // Logical AND of pir & radar & light
            new_state = pir & radar & light;
          } else if (pir_counts & radar_counts) {
            // Logical AND of pir & radar
            new_state = pir & radar;
          } else if (pir_counts & light_counts) {
            // Logical AND of pir & light
            new_state = pir & light;
          } else if (radar_counts & light_counts) {
            // Logical AND of radar & light
            new_state = radar & light;
          } else if (pir_counts) {
            // Only pir
            new_state = pir;
          } else if (radar_counts) {
            // Only radar
            new_state = radar;
          } else if (light_counts) {
            // Only light
            new_state = light;
          }

          ESP_LOGD("occupancy_clear_handler", "New state: %s", new_state ? "true" : "false");

          // Force update even if state hasn't changed
          id(supersensor_occupancy).publish_state(new_state);

          // Add a delayed re-publish to ensure state propagation
          if (!new_state) {
            id(supersensor_occupancy).publish_state(new_state);
          }

preferences:
  flash_write_interval: 15sec

logger:
  level: INFO
  baud_rate: 115200

api:
  reboot_timeout: 15min
  services:
    - service: restart_voice_assistant
      then:
        - logger.log: "Manually restarting voice assistant"
        - voice_assistant.stop:
        - delay: 2s
        - if:
            condition:
              switch.is_on: enable_voice_support
            then:
              - switch.turn_off: voice_support_active
              - delay: 1s
              - switch.turn_on: voice_support_active

ota:
  platform: esphome

web_server:
  port: 80

captive_portal:

mdns:
  disabled: false

wifi:
  ap: {}
  domain: ""
  output_power: 8.5dB
  reboot_timeout: 15min
  power_save_mode: none

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - logger.log: "Time synchronized with Home Assistant"

uart:
  id: ld2410_uart
  rx_pin: GPIO19
  tx_pin: GPIO18
  baud_rate: 256000
  data_bits: 8
  stop_bits: 1
  parity: NONE

i2c:
  sda: GPIO16
  scl: GPIO17
  scan: true

i2s_audio:
  i2s_lrclk_pin: GPIO26
  i2s_bclk_pin: GPIO27

microphone:
  - platform: i2s_audio
    id: mic
    adc_type: external
    i2s_din_pin: GPIO14
    pdm: false

interval:
  - interval: 5s
    then:
      - if:
          condition:
            and:
              - switch.is_on: enable_voice_support
              - switch.is_on: voice_support_active
              - not: voice_assistant.is_running
          then:
            - logger.log: "Voice assistant not running but should be; restarting"
            - voice_assistant.start_continuous:

  # Regular state reporting to HASS
  - interval: 30s
    then:
      - lambda: |-
          bool current_state = id(supersensor_occupancy).state;
          ESP_LOGD("state_reporter", "Republishing occupancy state: %s", current_state ? "true" : "false");
          id(supersensor_occupancy).publish_state(current_state);

  # API watchdog every 5 minutes
  - interval: 60s
    then:
      - lambda: |-
          if (api::global_api_server->is_connected()) {
            id(last_api_connected_time) = millis();
          } else if (millis() - id(last_api_connected_time) > 300000) {
            ESP_LOGE("api_watchdog", "API disconnected for too long, rebooting...");
            App.safe_reboot();
          }

# Add optional microWakeWord support (on-device wake word)
# Doesn't work well as of 2024-07-04 so leave disabled
#micro_wake_word:
#  model: hey_jarvis
#  on_wake_word_detected:
#    then:
#      - voice_assistant.start:
#          wake_word: !lambda return wake_word;

# Include the Espressif Audio Development Framework for VAD support
esp_adf:
external_components:
  - source: github://pr#5230
    components:
      - esp_adf
    refresh: 0s

voice_assistant:
  microphone: mic
  use_wake_word: false
  noise_suppression_level: 3
  auto_gain: 31dBFS
  volume_multiplier: 8.0
  id: assist
  on_error:
    - logger.log: "voice error"
    - if:
        condition:
          and:
            - switch.is_on: voice_support_active
            - not: voice_assistant.is_running
        then:
          - voice_assistant.start_continuous:
  on_end:
    - logger.log: "voice ended"
    - if:
        condition:
          and:
            - switch.is_on: voice_support_active
            - not: voice_assistant.is_running
        then:
          - voice_assistant.start_continuous:
  on_client_connected:
    - light.turn_off:
        id: output_led
        transition_length: 2s
    - script.execute: light_off
    - lambda: |-
        id(voice_support_active).publish_state(true);
  on_client_disconnected:
    - light.turn_on:
        id: output_led
        effect: flash_white
  on_wake_word_detected:
    - light.turn_on:
        id: output_led
        brightness: 100%
        red: 0
        green: 0
        blue: 1
  on_listening:
    - light.turn_on:
        id: output_led
        brightness: 100%
        red: 0
        green: 0
        blue: 1
  on_stt_vad_end:
    - light.turn_on:
        id: output_led
        brightness: 75%
        red: 0
        green: 1
        blue: 1
  on_stt_end:
    - script.execute: light_off
  on_tts_start:
    - if:
        condition:
        - lambda: |-
            ESP_LOGI("tts_response", "%s", x.c_str());
            return x.rfind("Sorry", 0) == 0;
        then:
          - logger.log: "Command failed!"
          - light.turn_on:
              id: output_led
              effect: hold
              brightness: 100%
              red: 1
              green: 0
              blue: 0
        else:
          - logger.log: "Command successful!"
          - light.turn_on:
              id: output_led
              effect: hold
              brightness: 100%
              red: 0
              green: 1
              blue: 0

light:
  - platform: rgb
    id: output_led
    red: rgb_r
    green: rgb_g
    blue: rgb_b
    default_transition_length: 0.15s
    flash_transition_length: 0.15s
    effects:
      - strobe:
          name: flash_white
          colors:
            - state: true
              brightness: 15%
              red: 100%
              green: 90%
              blue: 90%
              duration: 0.5s
            - state: false
              duration: 0.5s
      - automation:
          name: hold
          sequence:
            - delay: 5s
            - script.execute: light_off

output:
  - platform: ledc
    id: rgb_r
    pin: GPIO32
  - platform: ledc
    id: rgb_g
    pin: GPIO33
  - platform: ledc
    id: rgb_b
    pin: GPIO25

ld2410:
  id: ld2410_radar
  uart_id: ld2410_uart
  # These default values are captured here for
  # posterity. They are configured below.
  # max_move_distance : 6m
  # max_still_distance: 0.75m
  # g0_move_threshold: 10
  # g0_still_threshold: 20
  # g1_move_threshold: 10
  # g1_still_threshold: 20
  # g2_move_threshold: 20
  # g2_still_threshold: 21
  # g3_move_threshold: 30
  # g3_still_threshold: 31
  # g4_move_threshold: 40
  # g4_still_threshold: 41
  # g5_move_threshold: 50
  # g5_still_threshold: 51
  # g6_move_threshold: 60
  # g6_still_threshold: 61
  # g7_move_threshold: 70
  # g7_still_threshold: 71
  # g8_move_threshold: 80
  # g8_still_threshold: 81

binary_sensor:
  - platform: template
    name: "SuperSensor Occupancy"
    id: supersensor_occupancy
    device_class: occupancy
    on_press:
      - script.execute: light_off
    on_release:
      - script.execute: light_off

  - platform: gpio
    name: "PIR GPIO"
    id: pir_gpio
    pin: GPIO13
    internal: false
    device_class: motion
    on_press:
      - script.stop: pir_handler
      - script.execute: pir_handler

  - platform: template
    name: "PIR Presence"
    id: pir_presence
    device_class: motion
    on_press:
      - script.execute: occupancy_detect_handler
    on_release:
      - script.execute: occupancy_clear_handler

  - platform: template
    name: "Light Presence"
    id: light_presence
    device_class: motion
    on_press:
      - script.execute: occupancy_detect_handler
    on_release:
      - script.execute: occupancy_clear_handler

  - platform: ld2410
    ld2410_id: ld2410_radar
    has_target:
      name: "LD2410C Presence"
      id: radar_presence
      icon: mdi:motion-sensor
      device_class: motion
      on_press:
        - script.execute: occupancy_detect_handler
      on_release:
        - script.execute: occupancy_clear_handler
    has_moving_target:
      name: "LD2410C Moving Target"
    has_still_target:
      name: "LD2410C Still Target"

sensor:
  - platform: bme680
    address: 0x77
    update_interval: 15s
    iir_filter: 127x
    heater:
      temperature: 320
      duration: 150ms
    temperature:
      name: "BME680 Temperature"
      id: bme680_temperature
      oversampling: 16x
      filters:
        - offset: !lambda return id(temperature_offset);
    humidity:
      name: "BME680 Relative Humidity"
      id: bme680_humidity
      oversampling: 16x
      filters:
        - offset: !lambda return id(humidity_offset);
    pressure:
      name: "BME680 Pressure"
      id: bme680_pressure
      oversampling: 16x
      accuracy_decimals: 1
      filters:
        - offset: !lambda return id(pressure_offset);
    gas_resistance:
      name: "BME680 Raw Gas Resistance"
      id: bme680_gas_resistance
      icon: "mdi:gas-burner"
      entity_category: diagnostic
      internal: true

  - platform: absolute_humidity
    name: "BME680 Absolute Humidity"
    temperature: bme680_temperature
    humidity: bme680_humidity
    id: bme680_absolute_humidity

  - platform: template
    name: "BME680 AQ"
    id: bme680_aq
    icon: "mdi:gauge"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 15s
    lambda: |-
      // Get current sensor values and validate
      float gas_resistance = id(bme680_gas_resistance).state;
      float abs_humidity = id(bme680_absolute_humidity).state;
      float clean_resistance = id(bme680_clean_resistance);
      float polluted_resistance = id(bme680_polluted_resistance);
      float humidity_slope = id(bme680_humidity_slope);
      float humidity_offset = id(bme680_humidity_offset);

      ESP_LOGI("bme680_aq", "Input values - Gas: %.1f, Humidity: %.1f, Clean: %.1f, Polluted: %.1f, Slope: %.3f, Offset: %.3f",
               gas_resistance, abs_humidity, clean_resistance, polluted_resistance, humidity_slope, humidity_offset);

      // Comprehensive validation of all inputs and globals
      bool validation_failed = false;
      if (isnan(gas_resistance) || gas_resistance <= 0) {
        ESP_LOGI("bme680_aq", "Invalid gas resistance: %.1f", gas_resistance);
        validation_failed = true;
      }
      if (isnan(abs_humidity) || abs_humidity < 0) {
        ESP_LOGI("bme680_aq", "Invalid absolute humidity: %.1f", abs_humidity);
        validation_failed = true;
      }
      if (isnan(clean_resistance) || clean_resistance <= 0) {
        ESP_LOGI("bme680_aq", "Invalid clean resistance: %.1f", clean_resistance);
        validation_failed = true;
      }
      if (isnan(polluted_resistance) || polluted_resistance < 0) {
        ESP_LOGI("bme680_aq", "Invalid polluted resistance: %.1f", polluted_resistance);
        validation_failed = true;
      }
      if (polluted_resistance == 0) {
        ESP_LOGI("bme680_aq", "Uncalibrated polluted resistance");
        validation_failed = true;
      }
      if (clean_resistance <= polluted_resistance) {
        ESP_LOGI("bme680_aq", "Clean resistance (%.1f) <= polluted resistance (%.1f)", 
                 clean_resistance, polluted_resistance);
        validation_failed = true;
      }
      if (isnan(humidity_slope)) {
        ESP_LOGI("bme680_aq", "Invalid humidity slope: %.3f", humidity_slope);
        validation_failed = true;
      }
      if (isnan(humidity_offset)) {
        ESP_LOGI("bme680_aq", "Invalid humidity offset: %.3f", humidity_offset);
        validation_failed = true;
      }

      if (validation_failed) {
        ESP_LOGI("bme680_aq", "Input validation failed - returning 100");
        return 100;
      }

      // Cap gas resistance to reasonable bounds (1 to 1000 kΩ)
      float original_gas = gas_resistance;
      if (gas_resistance > 1000000) {
        ESP_LOGI("bme680_aq", "Gas resistance too high: %.1f -> 1000000", gas_resistance);
        gas_resistance = 1000000;
      }
      if (gas_resistance < 1000) {
        ESP_LOGI("bme680_aq", "Gas resistance too low: %.1f -> 1000", gas_resistance);
        gas_resistance = 1000;
      }
      if (original_gas != gas_resistance) {
        ESP_LOGI("bme680_aq", "Gas resistance capped from %.1f to %.1f", original_gas, gas_resistance);
      }

      // Compensate gas resistance for humidity effects
      float exp_term = humidity_slope * abs_humidity + humidity_offset;
      ESP_LOGI("bme680_aq", "Humidity compensation - Slope: %.3f, Offset: %.3f, Exp term: %.3f",
               humidity_slope, humidity_offset, exp_term);

      // Validate exp_term before using it
      if (isnan(exp_term) || exp_term > 100 || exp_term < -100) {
        ESP_LOGI("bme680_aq", "Invalid exp term: %.3f - returning 100", exp_term);
        return 100;
      }

      float compensated_gas = gas_resistance * exp(exp_term);
      ESP_LOGI("bme680_aq", "Compensated gas: %.1f (from %.1f)", compensated_gas, gas_resistance);

      // Validate compensated value and cap it to reasonable bounds
      if (isnan(compensated_gas) || compensated_gas <= 0 || compensated_gas > 10000000) {
        ESP_LOGI("bme680_aq", "Invalid compensation result: %.1f (raw: %.1f, slope: %.3f, offset: %.3f)",
                 compensated_gas, gas_resistance, humidity_slope, humidity_offset);
        return 100;
      }

      // Update moving average
      static float ma_buffer[240] = {0};
      static int ma_index = 0;
      ma_buffer[ma_index] = compensated_gas;
      ma_index = (ma_index + 1) % 240;

      float ma_sum = 0;
      int ma_count = 0;
      for (int i = 0; i < 240; i++) {
        if (ma_buffer[i] > 0 && !isnan(ma_buffer[i])) {  // Add nan check for buffer values
          ma_sum += ma_buffer[i];
          ma_count++;
        }
      }
      float moving_average = (ma_count > 0) ? (ma_sum / ma_count) : compensated_gas;
      ESP_LOGI("bme680_aq", "Moving average: %.1f (from %d samples)", moving_average, ma_count);

      // Validate moving average
      if (isnan(moving_average) || moving_average <= 0 || moving_average > 10000000) {
        ESP_LOGI("bme680_aq", "Invalid moving average: %.1f", moving_average);
        return 100;
      }

      // If in calibration mode, return 100%
      if (id(bme680_calibration_mode).state) {
        ESP_LOGI("bme680_aq", "In calibration mode - returning 100");
        return 100;
      }

      // Calculate the total range and position within it
      float effective_clean_resistance = clean_resistance * 0.9;
      float total_range = effective_clean_resistance - polluted_resistance;
      float current_position = moving_average - polluted_resistance;

      // Validate range calculations
      if (isnan(total_range) || total_range <= 0) {
        ESP_LOGI("bme680_aq", "Invalid total range: %.1f", total_range);
        return 100;
      }
      if (isnan(current_position)) {
        ESP_LOGI("bme680_aq", "Invalid current position: %.1f", current_position);
        return 100;
      }

      ESP_LOGI("bme680_aq", "Range calculation - Effective clean: %.1f, Total range: %.1f, Current position: %.1f",
               effective_clean_resistance, total_range, current_position);

      // Define asymmetric scaling
      float quality;
      float relative_pos;
      if (current_position >= total_range * 0.8) {
        relative_pos = (current_position - (total_range * 0.8)) / (total_range * 0.2);
        quality = 90.0 + (relative_pos * 10.0);
        ESP_LOGI("bme680_aq", "Quality calculation (top 20%%) - Relative pos: %.3f -> Quality: %.1f%%",
                 relative_pos, quality);
      } else if (current_position >= total_range * 0.5) {
        relative_pos = (current_position - (total_range * 0.5)) / (total_range * 0.3);
        quality = 70.0 + (relative_pos * 20.0);
        ESP_LOGI("bme680_aq", "Quality calculation (50-80%%) - Relative pos: %.3f -> Quality: %.1f%%",
                 relative_pos, quality);
      } else {
        relative_pos = current_position / (total_range * 0.5);
        quality = relative_pos * 70.0;
        ESP_LOGI("bme680_aq", "Quality calculation (bottom 50%%) - Relative pos: %.3f -> Quality: %.1f%%",
                 relative_pos, quality);
      }

      // Validate quality calculation
      if (isnan(quality)) {
        ESP_LOGI("bme680_aq", "Quality calculation resulted in NaN - returning 100");
        return 100;
      }

      // Ensure bounds
      float original_quality = quality;
      if (quality < 0.0) quality = 0.0;
      if (quality > 100.0) quality = 100.0;
      if (original_quality != quality) {
        ESP_LOGI("bme680_aq", "Quality capped from %.1f to %.1f", original_quality, quality);
      }

      ESP_LOGI("bme680_aq", "Final AQ value: %.1f%%", quality);
      return (int)quality;

  # Relative Pressure:
  # Calculates the relative pressure based on the elevation above sea level
  - platform: template
    name: "BME680 Relative Pressure"
    id: bme680_relative_pressure
    unit_of_measurement: hPa
    accuracy_decimals: 1
    update_interval: 15s
    lambda: |-
      // Get the current absolute pressure in hPa
      float abs_pressure = id(bme680_pressure).state;

      // Get the current temperature in Celsius
      float temperature = id(bme680_temperature).state;

      // Get the elevation in meters
      float elevation = id(elevation_meters);

      // Convert temperature to Kelvin
      float temp_kelvin = temperature + 273.15;

      // Calculate relative pressure using the barometric formula
      // P0 = P * exp(g * M * h / (R * T))
      // where:
      // P0 = sea level pressure
      // P = absolute pressure
      // g = gravitational acceleration (9.80665 m/s²)
      // M = molar mass of Earth's air (0.0289644 kg/mol)
      // h = height above sea level
      // R = universal gas constant (8.31432 N·m/(mol·K))
      // T = temperature in Kelvin
      float relative_pressure = abs_pressure * exp(9.80665 * 0.0289644 * elevation / (8.31432 * temp_kelvin));

      return relative_pressure;

