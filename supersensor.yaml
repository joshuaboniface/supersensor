        // Show "Inactive" only if never calibrated
        if (id(bme680_last_calibration_time) == 0) {
          return {"Inactive"};
        }
        return {"Calibrated"};
      }

      switch (id(bme680_calibration_phase)) {
        case 0:
          return {"Clean Air Snapshot (30s)"};
        case 1:
          return {"Expose Sensor to IPA (300s)"};
        case 2:
          return {"Remove IPA; Wait for Minimum"};
        case 3:
          return {"Wait for Recovery"};
        case 4:
          return {"Calibration Complete"};
        default:
          return {"Unknown"};
